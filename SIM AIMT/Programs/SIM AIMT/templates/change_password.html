{% extends "base.html" %}

{% block title %}Change Password - AIMT College{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="fas fa-key me-2"></i>Change Password
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('change_password') }}">
            <div class="mb-3">
                <label for="current_password" class="form-label">Current Password (optional)</label>
                <input type="password" class="form-control" id="current_password" name="current_password" placeholder="Enter current password if known">
            </div>
            <div class="mb-3">
                <label for="new_password" class="form-label">New Password</label>
                <input type="password" class="form-control" id="new_password" name="new_password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>
            <button class="btn btn-primary" type="submit"><i class="fas fa-save me-2"></i>Change Password</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
