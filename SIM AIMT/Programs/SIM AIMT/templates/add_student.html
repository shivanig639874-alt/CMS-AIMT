{% extends "base.html" %}

{% block title %}Add Student - AIMT College{% endblock %}
{% block page_title %}Add New Student{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="fas fa-user-graduate me-2"></i>Student Information
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('add_student') }}">
            <div class="row">
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="admission_year" class="form-label">Admission Year *</label>
                        <select class="form-select" id="admission_year" name="admission_year" required>
                            <option value="">Select Year</option>
                            {% for y in range(2018, (now.year + 2)) %}
                            <option value="{{ y }}" {% if y==now.year %}selected{% endif %}>{{ y }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label for="college_code" class="form-label">College Code</label>
                        <input type="text" class="form-control" id="college_code" name="college_code" value="225"
                            required>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="department" class="form-label">Department *</label>
                        <select class="form-select" id="department" name="department" required>
                            <option value="">Select Department</option>
                            <option value="MCA">MCA</option>
                            <option value="BTECH">BTECH</option>
                            <option value="BPH">B.PHARMA</option>
                            <option value="MPH">M.PHARMA</option>
                            <option value="BCA">BCA</option>
                            <option value="MBA">MBA</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="semester" class="form-label">Semester *</label>
                        <select class="form-select" id="semester" name="semester" required>
                            <option value="">Select Semester</option>
                            <option value="1">Semester 1</option>
                            <option value="2">Semester 2</option>
                            <option value="3">Semester 3</option>
                            <option value="4">Semester 4</option>
                            <option value="5">Semester 5</option>
                            <option value="6">Semester 6</option>
                            <option value="7">Semester 7</option>
                            <option value="8">Semester 8</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Login Credentials Section -->
            <div class="row mb-3">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="manual_roll_number" class="form-label">Roll Number *</label>
                        <input type="text" class="form-control border-info" id="manual_roll_number" name="manual_roll_number" placeholder="e.g. 25AITMCA0001" required>
                        <small class="text-muted d-block mt-1">Student will use this roll number to login</small>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="initial_password" class="form-label">Initial Password *</label>
                        <input type="password" class="form-control border-warning" id="initial_password" name="initial_password" placeholder="Set initial password" required>
                        <div class="form-text">Student must change this password on first login.</div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="first_name" class="form-label">First Name *</label>
                                <input type="text" class="form-control" id="first_name" name="first_name" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="last_name" class="form-label">Last Name *</label>
                                <input type="text" class="form-control" id="last_name" name="last_name" required>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="father_name" class="form-label">Father's Name *</label>
                        <input type="text" class="form-control" id="father_name" name="father_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name (auto-filled)</label>
                        <input type="text" class="form-control" id="name" name="name" readonly>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email">
                    </div>
                    <div class="mb-3">
                        <label for="Permanent_address" class="form-label">Permanent Address</label>
                        <input type="text" class="form-control" id="Permanent_address" name="Permanent_address">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="contact_phone" class="form-label">Alternate Phone Number</label>
                        <input type="tel" pattern="\d{10}" maxlength="10" inputmode="numeric" class="form-control" id="contact_phone" name="contact_phone">
                    </div>

                    <div class="mb-3">
                        <label for="current_address" class="form-label">Current Address</label>
                        <input type="text" class="form-control" id="current_address" name="current_address">
                    </div>
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>Add Student
                </button>
                <a href="{{ url_for('manage_students') }}" class="btn btn-secondary">
                    <i class="fas fa-times me-2"></i>Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const firstNameInput = document.getElementById('first_name');
    const lastNameInput = document.getElementById('last_name');
    const nameInput = document.getElementById('name');
    const manualRollNumberInput = document.getElementById('manual_roll_number');
    const passwordInput = document.getElementById('initial_password');
    const form = document.querySelector('form');

    const STORAGE_KEY_ROLL = 'manual_roll_number';
    const STORAGE_KEY_PASSWORD = 'initial_password';
    
    // Restore values from sessionStorage on page load
    function restoreValues() {
        const savedRoll = sessionStorage.getItem(STORAGE_KEY_ROLL);
        const savedPwd = sessionStorage.getItem(STORAGE_KEY_PASSWORD);

        if (savedRoll) {
            manualRollNumberInput.value = savedRoll;
        }
        if (savedPwd) {
            passwordInput.value = savedPwd;
        }
    }
    
    function updateFullName() {
        const firstName = firstNameInput.value.trim();
        const lastName = lastNameInput.value.trim();
        nameInput.value = (firstName + ' ' + lastName).trim();
    }
    
    // Form submission validation
    if (form) {
        form.addEventListener('submit', function(e) {
            // Store values if provided
            const roll = manualRollNumberInput.value.trim();
            const pwd = passwordInput.value.trim();
            
            if (roll) {
                sessionStorage.setItem(STORAGE_KEY_ROLL, roll);
            } else {
                sessionStorage.removeItem(STORAGE_KEY_ROLL);
            }
            
            if (pwd) {
                sessionStorage.setItem(STORAGE_KEY_PASSWORD, pwd);
            } else {
                sessionStorage.removeItem(STORAGE_KEY_PASSWORD);
            }
        });
    }
    
    // Restore saved values on page load
    restoreValues();
    
    // Setup event listeners
    if (firstNameInput && lastNameInput && nameInput) {
        firstNameInput.addEventListener('input', updateFullName);
        lastNameInput.addEventListener('input', updateFullName);
    }
});
</script>
{% endblock %}
