{% extends "base.html" %}

{% block title %}Edit Employee - AIMT College{% endblock %}
{% block page_title %}Edit Employee{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="fas fa-user-edit me-2"></i>Edit Employee Information
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('edit_employee', employee_id=employee.employee_id) }}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="employee_id" class="form-label">Employee ID</label>
                        <input type="text" class="form-control" id="employee_id" value="{{ employee.employee_id }}" disabled>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name *</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ employee.name }}" required>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address *</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ employee.email }}" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <input type="text" class="form-control" id="phone" name="phone" value="{{ employee.phone or '' }}">
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="role" class="form-label">Role *</label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="Teaching" {% if employee.role == 'Teaching' %}selected{% endif %}>Teaching</option>
                            <option value="Non-Teaching" {% if employee.role == 'Non-Teaching' %}selected{% endif %}>Non-Teaching</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="department" class="form-label">Department *</label>
                        <select class="form-select" id="department" name="department" required>
                            <option value="">Select Department</option>
                            <!-- Admin Departments -->
                            <option value="Human Resources" class="admin-dept" {% if employee.department == 'Human Resources' %}selected{% endif %}>Human Resources</option>
                            <option value="Administration" class="admin-dept" {% if employee.department == 'Administration' %}selected{% endif %}>Administration</option>
                            <option value="Management" class="admin-dept" {% if employee.department == 'Management' %}selected{% endif %}>Management</option>
                            <option value="Accounts" class="admin-dept" {% if employee.department == 'Accounts' %}selected{% endif %}>Accounts</option>
                            <option value="Library" class="admin-dept" {% if employee.department == 'Library' %}selected{% endif %}>Library</option>
                            <!-- Teaching Departments -->
                            <option value="MCA" class="teaching-dept" {% if employee.department == 'MCA' %}selected{% endif %}>MCA</option>
                            <option value="BTECH" class="teaching-dept" {% if employee.department == 'BTECH' %}selected{% endif %}>BTECH</option>
                            <option value="B.PHARMA" class="teaching-dept" {% if employee.department == 'B.PHARMA' %}selected{% endif %}>B.PHARMA</option>
                            <option value="M.PHARMA" class="teaching-dept" {% if employee.department == 'M.PHARMA' %}selected{% endif %}>M.PHARMA</option>
                            <option value="BCA" class="teaching-dept" {% if employee.department == 'BCA' %}selected{% endif %}>BCA</option>
                            <option value="BBA" class="teaching-dept" {% if employee.department == 'BBA' %}selected{% endif %}>BBA</option>
                            <option value="MBA" class="teaching-dept" {% if employee.department == 'MBA' %}selected{% endif %}>MBA</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label for="designation" class="form-label">Designation *</label>
                        <select class="form-select" id="designation" name="designation" required>
                            <option value="">Select Designation</option>
                            <!-- Human Resources Department -->
                            <option value="HR Manager" class="hr-dept" {% if employee.designation == 'HR Manager' %}selected{% endif %}>HR Manager</option>
                            <option value="HR Assistant" class="hr-dept" {% if employee.designation == 'HR Assistant' %}selected{% endif %}>HR Assistant</option>
                            <!-- Management Department -->
                            <option value="Director" class="mgmt-dept" {% if employee.designation == 'Director' %}selected{% endif %}>Director</option>
                            <option value="Dean" class="mgmt-dept" {% if employee.designation == 'Dean' %}selected{% endif %}>Dean</option>
                            <!-- Administration Department -->
                            <option value="Registrar" class="admin-dept" {% if employee.designation == 'Registrar' %}selected{% endif %}>Registrar</option>
                            <option value="Administrative Officer" class="admin-dept" {% if employee.designation == 'Administrative Officer' %}selected{% endif %}>Administrative Officer</option>
                            <!-- Accounts Department -->
                            <option value="Finance Officer" class="accounts-dept" {% if employee.designation == 'Finance Officer' %}selected{% endif %}>Finance Officer</option>
                            <option value="Cashier" class="accounts-dept" {% if employee.designation == 'Cashier' %}selected{% endif %}>Cashier</option>
                            <option value="Accountant" class="accounts-dept" {% if employee.designation == 'Accountant' %}selected{% endif %}>Accountant</option>
                            <!-- Library Department -->
                            <option value="Library Head" class="library-dept" {% if employee.designation == 'Library Head' %}selected{% endif %}>Library Head</option>
                            <option value="Librarian" class="library-dept" {% if employee.designation == 'Librarian' %}selected{% endif %}>Librarian</option>
                            <!-- Teaching Departments -->
                            <option value="Head of Department" class="teaching-desig" {% if employee.designation == 'Head of Department' %}selected{% endif %}>Head of Department</option>
                            <option value="Professor" class="teaching-desig" {% if employee.designation == 'Professor' %}selected{% endif %}>Professor</option>
                            <option value="Lecturer" class="teaching-desig" {% if employee.designation == 'Lecturer' %}selected{% endif %}>Lecturer</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="is_active" name="is_active" {% if employee.is_active %}checked{% endif %}>
                            <label class="form-check-label" for="is_active">
                                Active Account
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>Update Employee
                </button>
                <a href="{{ url_for('manage_employees') }}" class="btn btn-secondary">
                    <i class="fas fa-times me-2"></i>Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const roleSelect = document.getElementById('role');
    const departmentSelect = document.getElementById('department');
    const designationSelect = document.getElementById('designation');
    const adminDepts = document.querySelectorAll('select#department .admin-dept');
    const teachingDepts = document.querySelectorAll('select#department .teaching-dept');
    
    // Designation groups by department
    const designationMap = {
        'Human Resources': ['HR Manager', 'HR Assistant'],
        'Management': ['Director', 'Dean'],
        'Administration': ['Registrar', 'Administrative Officer'],
        'Accounts': ['Finance Officer', 'Cashier', 'Accountant'],
        'Library': ['Library Head', 'Librarian'],
        'MCA': ['Head of Department', 'Professor', 'Lecturer'],
        'BTECH': ['Head of Department', 'Professor', 'Lecturer'],
        'B.PHARMA': ['Head of Department', 'Professor', 'Lecturer'],
        'M.PHARMA': ['Head of Department', 'Professor', 'Lecturer'],
        'BCA': ['Head of Department', 'Professor', 'Lecturer'],
        'BBA': ['Head of Department', 'Professor', 'Lecturer'],
        'MBA': ['Head of Department', 'Professor', 'Lecturer']
    };
    
    function updateDepartments() {
        const selectedRole = roleSelect.value;
        
        if (selectedRole === 'Teaching') {
            // Hide admin departments, show teaching departments
            adminDepts.forEach(opt => opt.style.display = 'none');
            teachingDepts.forEach(opt => opt.style.display = 'block');
        } else {
            // Show admin departments, hide teaching departments
            adminDepts.forEach(opt => opt.style.display = 'block');
            teachingDepts.forEach(opt => opt.style.display = 'none');
        }
        
        // Update designations when role changes
        updateDesignations();
    }
    
    function updateDesignations() {
        const selectedDept = departmentSelect.value;
        const allOptions = designationSelect.querySelectorAll('option');
        
        // Hide all designation options except the first one
        allOptions.forEach(opt => {
            if (opt.value !== '') {
                opt.style.display = 'none';
            }
        });
        
        // Show designations for selected department
        if (selectedDept && designationMap[selectedDept]) {
            const validDesignations = designationMap[selectedDept];
            allOptions.forEach(opt => {
                if (validDesignations.includes(opt.value)) {
                    opt.style.display = 'block';
                }
            });
        }
    }
    
    roleSelect.addEventListener('change', updateDepartments);
    departmentSelect.addEventListener('change', updateDesignations);
    // Initialize on page load
    updateDepartments();
});
</script>
{% endblock %}
